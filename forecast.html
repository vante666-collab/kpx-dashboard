<style>
  :root{
    --card:#eee8d5; --muted:#93a1a1; --accent:#cb4b16; --border:#d6cfb8; --radius:12px;
    --bg:#fdf6e3; --fg:#073642; --sub:#586e75;
    --smp:#cb4b16; --dem:#268bd2; --temp:#b58900; --base:#2aa198; --hist:#93a1a1; --fcast:#dc322f;
    --shadow:2px 2px 8px 0 hsl(196 83% 10% / .12);
  }
  .dark{
    --card:#073642; --muted:#586e75; --border:#0c4250; --bg:#002b36; --fg:#93a1a1; --sub:#839496;
    --shadow:2px 2px 10px 0 hsl(196 83% 4% / .35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Outfit",sans-serif;background:var(--bg);color:var(--fg);
       padding:clamp(12px,3vw,28px);transition:.25s}
  .mono{font-family:"Space Mono",monospace}
  header{display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin-bottom:18px}
  header h1{font-size:clamp(19px,2.4vw,27px);font-weight:800;letter-spacing:-.02em}
  header .sub{color:var(--sub);font-size:13px;margin-top:3px}
  .spacer{flex:1}
  button{font-family:inherit;border:1px solid var(--border);background:var(--card);
       color:var(--fg);border-radius:8px;padding:8px 12px;cursor:pointer;font-size:14px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
        padding:14px 16px;box-shadow:var(--shadow)}
  .card.hero{background:linear-gradient(135deg,var(--accent),#d33682);color:#fdf6e3;border:none}
  .card .label{font-size:12px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
  .card.hero .label{color:#fdf6e3;opacity:.85}
  .card .val{font-size:28px;font-weight:800;margin-top:4px}
  .card .val.mono{font-size:25px}
  .card .delta{font-size:12px;color:var(--sub);margin-top:2px}
  .card.hero .delta{color:#fdf6e3;opacity:.9}
  .grid2{display:grid;grid-template-columns:1fr;gap:16px}
  @media(min-width:900px){.grid2{grid-template-columns:1.25fr .75fr}}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
         padding:16px;box-shadow:var(--shadow)}
  .panel h2{font-size:15px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .panel h2 .tag{font-size:11px;font-weight:600;color:var(--sub);background:var(--bg);
        border:1px solid var(--border);border-radius:20px;padding:2px 8px}
  .chartbox{position:relative;height:310px}
  .note{font-size:12px;color:var(--sub);line-height:1.6;margin-top:18px;
        border-top:1px solid var(--border);padding-top:12px}
  .note b{color:var(--fg)}
</style>
</head>

<script>
const D = TMR_DATA;
const css = v => getComputedStyle(document.body).getPropertyValue(v).trim();
let tmrC, curveC, trendC;

function cards(){
  const items=[
    {hero:true,label:'내일 일평균 예측 SMP',val:D.avg+' 원',delta:`${D.target} (${D.dayType})`},
    {label:'예측 피크',val:D.max,delta:`원/kWh · ${D.peakHr}시  (최저 ${D.min})`},
    {label:'수요예측 정확도',val:(D.demandMape??'–')+'%',delta:'MAPE (2026 홀드아웃)'},
    {label:'엔드투엔드 검증',val:D.e2eMape+'%',delta:'기온→수요→SMP MAPE'},
  ];
  document.getElementById('cards').innerHTML=items.map(i=>
    `<div class="card${i.hero?' hero':''}"><div class="label">${i.label}</div>
     <div class="val mono">${i.val}</div><div class="delta">${i.delta}</div></div>`).join('');
  document.getElementById('hdr').textContent=`내일 ${D.target} · 태양광보정 ${D.solarA}GW · 공급곡선 직전 ${D.trainDays}일(~${D.trainEnd})`;
  document.getElementById('tgtTag').textContent=D.target+' '+D.dayType;
}

function drawTmr(){
  const r=D.rows;
  if(tmrC) tmrC.destroy();
  tmrC=new Chart(document.getElementById('tmrChart'),{
    data:{labels:r.map(x=>x.hr),datasets:[
      {type:'line',label:'예측 SMP',data:r.map(x=>x.smp),borderColor:css('--smp'),
       backgroundColor:'transparent',borderWidth:2.6,tension:.3,pointRadius:0,yAxisID:'y'},
      {type:'line',label:'예측 수요(GW)',data:r.map(x=>x.demand),borderColor:css('--dem'),
       backgroundColor:'transparent',borderWidth:1.4,tension:.3,pointRadius:0,yAxisID:'y1'},
      {type:'line',label:'기온(℃)',data:r.map(x=>x.temp),borderColor:css('--temp'),
       backgroundColor:'transparent',borderWidth:1.2,borderDash:[4,3],tension:.3,pointRadius:0,yAxisID:'y2'},
    ]},
    options:{maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{color:css('--fg'),font:{size:11},boxWidth:18}}},
      scales:{
        x:{title:{display:true,text:'시(hr)',color:css('--sub')},ticks:{color:css('--sub')},grid:{color:css('--border')}},
        y:{position:'left',title:{display:true,text:'SMP 원/kWh',color:css('--smp')},ticks:{color:css('--sub')},grid:{color:css('--border')}},
        y1:{position:'right',title:{display:true,text:'수요 GW',color:css('--dem')},ticks:{color:css('--sub')},grid:{drawOnChartArea:false}},
        y2:{display:false},
      }}
  });
}

function drawCurve(){
  if(curveC) curveC.destroy();
  curveC=new Chart(document.getElementById('curveChart'),{
    data:{datasets:[
      {type:'line',label:'공급곡선(적합)',data:D.curve.map(p=>({x:p.x,y:p.y})),
       borderColor:css('--accent'),backgroundColor:'transparent',borderWidth:2.4,pointRadius:0,tension:0,order:1},
      {type:'scatter',label:'최근 관측',data:D.points.map(p=>({x:p.x,y:p.y})),
       backgroundColor:css('--hist'),pointRadius:2,order:3},
      {type:'scatter',label:'내일 예측',data:D.rows.map(r=>({x:r.net,y:r.smp})),
       backgroundColor:css('--fcast'),pointRadius:4,order:2},
    ]},
    options:{maintainAspectRatio:false,
      plugins:{legend:{labels:{color:css('--fg'),font:{size:11},boxWidth:18}}},
      scales:{
        x:{type:'linear',title:{display:true,text:'순부하 GW',color:css('--sub')},ticks:{color:css('--sub')},grid:{color:css('--border')}},
        y:{title:{display:true,text:'SMP 원/kWh',color:css('--sub')},ticks:{color:css('--sub')},grid:{color:css('--border')}},
      }}
  });
}

function drawTrend(){
  const t=D.trend;
  if(trendC) trendC.destroy();
  trendC=new Chart(document.getElementById('trendChart'),{
    type:'bar',
    data:{labels:t.map(x=>x.date),datasets:[
      {label:'일평균 SMP',data:t.map(x=>x.smp),
       backgroundColor:t.map(x=>x.f?css('--fcast'):css('--base'))}]},
    options:{maintainAspectRatio:false,
      plugins:{legend:{display:false},
        tooltip:{callbacks:{title:(it)=>t[it[0].dataIndex].f?'내일 예측 '+t[it[0].dataIndex].date:t[it[0].dataIndex].date}}},
      scales:{x:{ticks:{color:css('--sub'),font:{size:9},maxRotation:90,minRotation:90},grid:{display:false}},
              y:{title:{display:true,text:'원/kWh',color:css('--sub')},ticks:{color:css('--sub')},grid:{color:css('--border')}}}}
  });
}

function redraw(){drawTmr();drawCurve();drawTrend();}

function init(){
  if(!D){document.getElementById('foot').innerHTML='⚠ TMR_DATA 비어있음. <code>python weather_demand.py --emit-dashboard 20260702</code> 실행';return;}
  cards();
  document.getElementById('foot').innerHTML=
    `<b>파이프라인</b>: 기상청 예보기온 → 수요모델(시간·요일유형별 기온 2차회귀, MAPE ${D.demandMape}%) → `+
    `트레일링 ${D.trainDays}일 공급곡선(등위회귀+태양광 ${D.solarA}GW 보정) → 내일 24h SMP. `+
    `순수 전방예측(예보오차 포함) 검증 MAPE ≈ ${D.e2eMape}%.<br>`+
    `<b>데이터</b>: 팀 S3(kpx-epowermarket-data) 시간별 SMP·수요·기온. <b>주의</b>: 그날그날 공급측 변동(정비·한계연료)은 미반영 → 실측과 차이 가능.`;
  redraw();
}
document.getElementById('themeBtn').onclick=()=>{
  document.body.classList.toggle('dark');
  document.getElementById('themeBtn').textContent=document.body.classList.contains('dark')?'☀️ 라이트':'🌙 다크';
  redraw();
};
init();
</script>
